<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Science Lab</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-100 font-sans">

<!-- ================= HEADER ================= -->
<header class="bg-white shadow-md p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <i data-lucide="flask-conical"></i>
        <h1 class="text-xl font-bold">Virtual Science Lab</h1>
    </div>

    <div class="flex items-center gap-4">
        <input id="search-input"
               onkeyup="handleSearch()"
               type="text"
               placeholder="Search simulations..."
               class="border px-3 py-1 rounded-lg">

        <div class="flex items-center gap-2">
            <img id="header-avatar" class="w-8 h-8 rounded-full">
            <span id="header-user-name"></span>
        </div>
    </div>
</header>

<!-- ================= NAVIGATION ================= -->
<nav class="bg-white border-b p-3 flex gap-6 justify-center">
    <button id="nav-dashboard" class="nav-item active-nav"
            onclick="switchTab('dashboard')">
        Dashboard
    </button>

    <button id="nav-sims" class="nav-item"
            onclick="switchTab('sims')">
        Simulations
    </button>

    <button id="nav-challenges" class="nav-item"
            onclick="switchTab('challenges')">
        Challenges
    </button>

    <button id="nav-store" class="nav-item"
            onclick="switchTab('store')">
        Store
    </button>

    <button id="nav-profile" class="nav-item"
            onclick="switchTab('profile')">
        Profile
    </button>
</nav>

<!-- ================= MAIN VIEW ================= -->
<main class="p-6">
    <div id="view-container"></div>
</main>

<!-- ================= STYLES ================= -->
<style>
.nav-item {
    padding: 8px 14px;
    border-radius: 10px;
}

.nav-item:hover {
    background: #e2e8f0;
}

.active-nav {
    background: #0f172a;
    color: white;
}
</style>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
