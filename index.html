<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabSim AI - Desktop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen overflow-hidden flex">

    <!-- SIDEBAR -->
    <aside class="w-20 lg:w-64 bg-white h-full flex flex-col border-r border-slate-200 z-30 transition-all duration-300">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i data-lucide="flask-conical"></i>
            </div>
            <span class="hidden lg:block font-extrabold text-xl tracking-tight text-slate-800">LabSim AI</span>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4" id="main-nav">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item active-nav w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all group">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="hidden lg:block font-bold text-sm">Dashboard</span>
            </button>
            <button onclick="switchTab('sims')" id="nav-sims" class="nav-item text-slate-500 hover:bg-slate-50 w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all group">
                <i data-lucide="target" class="w-5 h-5"></i>
                <span class="hidden lg:block font-bold text-sm">Simulations</span>
            </button>
            <button onclick="switchTab('challenges')" id="nav-challenges" class="nav-item text-slate-500 hover:bg-slate-50 w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all group">
                <i data-lucide="trophy" class="w-5 h-5"></i>
                <span class="hidden lg:block font-bold text-sm">Challenges</span>
            </button>
            <button onclick="switchTab('profile')" id="nav-profile" class="nav-item text-slate-500 hover:bg-slate-50 w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all group">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="hidden lg:block font-bold text-sm">Profile</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <button class="text-slate-500 hover:bg-slate-50 w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all group">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="hidden lg:block font-bold text-sm">Settings</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- HEADER -->
        <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 shrink-0 z-20">
            <div class="relative w-96 hidden md:block">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input 
                    type="text" 
                    id="search-input"
                    oninput="handleSearch()"
                    placeholder="Search experiments..." 
                    class="w-full bg-slate-50 rounded-full py-2 pl-10 pr-4 border-none focus:ring-2 focus:ring-blue-100 transition-all outline-none text-sm"
                >
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                    <i data-lucide="gem" class="text-blue-500 w-4 h-4"></i>
                    <span class="font-bold text-blue-700 text-sm">144</span>
                </div>
                <div class="flex items-center gap-2 bg-orange-50 px-3 py-1.5 rounded-full border border-orange-100">
                    <i data-lucide="coins" class="text-orange-500 w-4 h-4"></i>
                    <span class="font-bold text-orange-700 text-sm">2,321</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm cursor-pointer hover:scale-105 transition-transform">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Felix" alt="avatar">
                </div>
            </div>
        </header>

        <!-- SCROLLABLE AREA -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar" id="view-container">
            <!-- Content will be injected here -->
        </div>

        <!-- FULLSCREEN SIMULATION OVERLAY -->
        <div id="sim-overlay" class="hidden absolute inset-0 z-50 bg-slate-900 flex flex-col text-white">
            <header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-8">
                <button onclick="exitSimulation()" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span>Exit Simulation</span>
                </button>
                <div class="flex items-center gap-4">
                    <span class="font-bold" id="active-sim-title">Simulation Name</span>
                    <div class="h-2 w-48 bg-slate-700 rounded-full overflow-hidden">
                        <div id="active-sim-progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-1000"></div>
                    </div>
                    <span class="text-xs text-slate-400" id="active-sim-progress-text">0% Complete</span>
                </div>
                <div class="flex gap-2">
                    <button class="p-2 bg-slate-700 rounded-lg hover:bg-slate-600"><i data-lucide="info" class="w-5 h-5"></i></button>
                    <button class="p-2 bg-blue-600 rounded-lg hover:bg-blue-500 font-bold px-4 text-sm">Save Progress</button>
                </div>
            </header>
            <div class="flex-1 p-8 flex items-center justify-center">
                <div class="w-full h-full bg-slate-800 rounded-[3rem] border-4 border-slate-700 flex flex-col items-center justify-center shadow-2xl relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_#3b82f6,_transparent)]"></div>
                    <span id="active-sim-emoji" class="text-9xl mb-8 animate-bounce">🧪</span>
                    <h2 class="text-4xl font-black mb-4">Laboratory Active</h2>
                    <p class="text-slate-400 max-w-md text-center">Interactive 3D simulation is now running in your browser.</p>
                    <div class="mt-12 flex gap-4">
                        <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 backdrop-blur-sm text-center w-40">
                            <i data-lucide="zap" class="mx-auto mb-2 text-yellow-400"></i>
                            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Stability</div>
                            <div class="text-xl font-black">98.2%</div>
                        </div>
                        <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 backdrop-blur-sm text-center w-40">
                            <i data-lucide="clock" class="mx-auto mb-2 text-blue-400"></i>
                            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Runtime</div>
                            <div class="text-xl font-black">04:12</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
